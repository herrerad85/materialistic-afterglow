---
name: Build and release APK on tag
"on":
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSPHRASE: ${{ secrets.KEYSTORE_PASSPHRASE }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          {
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSPHRASE"
            echo "KEY_ALIAS=signingkey"
            echo "KEY_PASSWORD=$KEYSTORE_PASSPHRASE"
          } >> "$GITHUB_ENV"
      - name: Build release APK
        uses: ./.github/actions/gradle-task
        with:
          task: assembleRelease
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            "app/build/outputs/apk/release/afterglow-${{ github.ref_name }}.apk"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            "app/build/outputs/apk/release/afterglow-${{ github.ref_name }}.apk"
